<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Engineer Market Value Scorecard</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>
  <div class="wizard-shell" x-data="candidateScorecard()" x-init="init()">
    <header class="sticky top-0 z-20 border-b border-border bg-cream/90 backdrop-blur-md">
      <div class="mx-auto max-w-[var(--container-narrow)] px-4 py-4 sm:px-6">
        <div class="flex items-center justify-between gap-4">
          <div>
            <p class="font-serif text-lg font-semibold tracking-tight text-ink sm:text-xl">
              Careerspection
              <span class="font-sans text-sm font-medium text-ink-muted">(Candidate Value Score)</span>
            </p>
            <p class="text-xs font-semibold uppercase tracking-widest text-ink-faint">Engineer Market Value Scorecard</p>
          </div>
          <p class="shrink-0 text-xs font-medium text-ink-muted" x-text="`Step ${currentStep} of ${steps.length}`"></p>
        </div>
        <div class="wizard-progress-track mt-3">
          <div class="wizard-progress-fill" :style="`width: ${(currentStep / steps.length) * 100}%`"></div>
        </div>
      </div>
    </header>

    <main class="mx-auto w-full max-w-[var(--container-narrow)] flex-1 px-4 py-8 sm:px-6 sm:py-12">
      <div x-show="sessionRestored" x-transition class="session-banner mb-6 animate-fade-in">
        <span>Welcome back! Your progress was restored.</span>
        <button type="button" @click="clearSession()" class="btn-ghost shrink-0">Start over</button>
      </div>

      <div class="mb-8 animate-fade-up" x-show="currentStep < 8">
        <h1 class="font-serif text-3xl font-semibold tracking-tight text-ink sm:text-4xl" x-text="currentStepData.title"></h1>
        <p class="mt-3 max-w-2xl text-base leading-relaxed text-ink-muted" x-text="currentStepData.description"></p>
        <p x-show="currentStep > 1 && currentStep < 8" class="mt-4 inline-flex items-center gap-2 rounded-full bg-emerald-50 px-3 py-1 text-sm font-semibold text-emerald-800">
          <span x-text="currentStepData.scoreLabel"></span>
          <span x-text="`${currentSectionScore}/100`"></span>
        </p>
      </div>

      <div class="wizard-card p-6 sm:p-8 animate-scale-in">
          <template x-if="currentStep === 1">
            <form @submit.prevent="nextStep()"
                  x-transition:enter="transition ease-out duration-300"
                  x-transition:enter-start="opacity-0 translate-y-3"
                  x-transition:enter-end="opacity-100 translate-y-0"
                  class="space-y-6">
            <div class="grid gap-6 md:grid-cols-2">
              <label class="block">
                <span class="field-label">Full Name <span class="text-red-600">*</span></span>
                <input type="text" x-model.trim="identity.name" @input="saveSession()" class="field-input">
              </label>
              <label class="block">
                <span class="field-label">Email</span>
                <input type="email" x-model.trim="identity.email" @input="saveSession()" class="field-input">
              </label>
              <label class="block">
                <span class="field-label">Target Role <span class="text-red-600">*</span></span>
                <select x-model="identity.targetRole" @change="saveSession()" class="field-input">
                  <option value="">Select a role</option>
                  <template x-for="option in targetRoles" :key="option">
                    <option :value="option" x-text="option"></option>
                  </template>
                </select>
              </label>
              <label class="block">
                <span class="field-label">Target Level <span class="text-red-600">*</span></span>
                <select x-model="identity.targetLevel" @change="saveSession()" class="field-input">
                  <option value="">Select a level</option>
                  <template x-for="option in targetLevels" :key="option">
                    <option :value="option" x-text="option"></option>
                  </template>
                </select>
              </label>
            </div>

            <div>
              <p class="field-label">Target Market</p>
              <div class="mt-3 grid gap-2 sm:grid-cols-2">
                <template x-for="option in targetMarkets" :key="option">
                  <label class="market-chip">
                    <input type="checkbox" :value="option" x-model="identity.targetMarket" @change="saveSession()">
                    <span x-text="option"></span>
                  </label>
                </template>
              </div>
            </div>

            <label class="block">
              <span class="field-label">Candidate Positioning Statement</span>
              <textarea x-model.trim="identity.positioning" @input="saveSession()" rows="3" placeholder="Describe yourself in one sentence as a software engineer." class="field-input"></textarea>
              <span class="mt-1.5 block text-xs text-ink-faint">Example: Backend engineer focused on scalable APIs, cloud infrastructure, and payment systems.</span>
            </label>

            <p x-show="identityError" x-transition class="rounded-lg bg-red-50 px-4 py-3 text-sm text-red-700" x-text="identityError"></p>
            </form>
          </template>

          <template x-if="currentStep >= 2 && currentStep <= 6">
            <div class="space-y-8"
                 x-transition:enter="transition ease-out duration-300"
                 x-transition:enter-start="opacity-0 translate-y-3"
                 x-transition:enter-end="opacity-100 translate-y-0">
              <template x-for="(question, index) in currentQuestions" :key="question.id">
                <fieldset class="question-block animate-fade-up" :class="`stagger-${Math.min(index + 1, 6)}`">
                  <div class="flex flex-col gap-2 sm:flex-row sm:items-start sm:justify-between">
                    <div class="flex-1">
                      <legend class="question-title" x-text="question.label"></legend>
                      <p class="question-note" x-text="question.note"></p>
                    </div>
                    <span class="question-badge mt-1 sm:mt-0" x-text="`${question.area} · ${question.maxPoints} pts`"></span>
                  </div>
                  <div class="mt-4 grid gap-2">
                    <template x-for="option in question.options" :key="`${question.id}-${option.value}`">
                      <label class="option-card"
                             :class="currentSectionState[question.id] === option.value ? 'option-card-selected' : ''">
                        <span class="flex items-center gap-3">
                          <input type="radio" :name="question.id" :value="option.value" x-model.number="currentSectionState[question.id]" @change="saveSession()">
                          <span x-text="option.label"></span>
                        </span>
                        <span class="shrink-0 text-sm font-semibold text-ink-muted" x-text="`${option.value} pts`"></span>
                      </label>
                    </template>
                  </div>
                </fieldset>
              </template>
            </div>
          </template>

          <template x-if="currentStep === 7">
            <div class="space-y-6"
                 x-transition:enter="transition ease-out duration-300"
                 x-transition:enter-start="opacity-0 translate-y-3"
                 x-transition:enter-end="opacity-100 translate-y-0">
              <template x-for="(question, index) in readinessQuestions" :key="question.id">
                <div class="question-block animate-fade-up" :class="`stagger-${Math.min(index + 1, 6)}`">
                  <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
                    <div class="flex-1">
                      <h3 class="question-title" x-text="question.label"></h3>
                      <p class="question-note" x-text="question.note"></p>
                    </div>
                    <div class="toggle-yesno shrink-0">
                      <button type="button" @click="readiness[question.id] = true; saveSession()" :class="readiness[question.id] ? 'active-yes' : 'inactive'">Yes</button>
                      <button type="button" @click="readiness[question.id] = false; saveSession()" :class="!readiness[question.id] ? 'active-no' : 'inactive'">No</button>
                    </div>
                  </div>
                </div>
              </template>
            </div>
          </template>

          <template x-if="currentStep === 8">
            <div class="space-y-8 animate-fade-in"
                 x-transition:enter="transition ease-out duration-400"
                 x-transition:enter-start="opacity-0 translate-y-4"
                 x-transition:enter-end="opacity-100 translate-y-0">
              <div class="mb-2">
                <h1 class="font-serif text-3xl font-semibold tracking-tight text-ink sm:text-4xl">Your Results</h1>
                <p class="mt-2 text-base text-ink-muted">Review your final weighted Candidate Value Score and 30-day recommendation.</p>
              </div>

              <div class="export-actions">
                <button type="button" @click="downloadAsPDF()" :disabled="exporting" class="btn-secondary">
                  <span x-text="exporting ? 'Generating…' : 'Download PDF'"></span>
                </button>
                <button type="button" @click="downloadAsImage()" :disabled="exporting" class="btn-secondary">
                  <span x-text="exporting ? 'Generating…' : 'Download Image'"></span>
                </button>
              </div>

              <div id="results-report" class="space-y-6 rounded-xl bg-cream p-1">
                <div class="grid gap-4 lg:grid-cols-[1.1fr_0.9fr]">
                  <div class="rounded-xl border border-border bg-white p-5 sm:p-6">
                    <p class="text-xs font-semibold uppercase tracking-widest text-ink-faint">Candidate Report</p>
                    <h3 class="mt-2 font-serif text-2xl font-semibold text-ink" x-text="identity.name || 'Candidate'"></h3>
                    <div class="mt-4 grid gap-2 text-sm text-ink-muted sm:grid-cols-2">
                      <p x-show="identity.email"><span class="font-semibold text-ink">Email:</span> <span x-text="identity.email"></span></p>
                      <p><span class="font-semibold text-ink">Target role:</span> <span x-text="identity.targetRole"></span></p>
                      <p><span class="font-semibold text-ink">Target level:</span> <span x-text="identity.targetLevel"></span></p>
                      <p><span class="font-semibold text-ink">Target market:</span> <span x-text="targetMarketDisplay"></span></p>
                    </div>
                    <p x-show="identity.positioning" class="mt-4 rounded-lg bg-cream px-4 py-3 text-sm leading-relaxed text-ink-muted" x-text="identity.positioning"></p>
                  </div>
                  <div class="results-hero p-5 sm:p-6">
                    <p class="text-xs font-semibold uppercase tracking-widest text-emerald-800">Final Candidate Value Score</p>
                    <div class="mt-3 flex items-end gap-2">
                      <span class="font-serif text-5xl font-bold text-emerald-950" x-text="finalScore"></span>
                      <span class="pb-2 text-lg font-semibold text-emerald-800">/100</span>
                    </div>
                    <h3 class="mt-4 font-serif text-xl font-semibold text-emerald-950" x-text="tier"></h3>
                    <p class="mt-2 text-sm leading-relaxed text-emerald-900" x-text="tierDescription"></p>
                  </div>
                </div>

                <div class="grid gap-4 md:grid-cols-2">
                  <div class="rounded-xl border border-border bg-white p-4 sm:p-5">
                    <p class="text-xs font-semibold uppercase tracking-widest text-ink-faint">Strongest Pillar</p>
                    <h3 class="mt-2 font-serif text-lg font-semibold text-ink" x-text="`${strongestPillar.name} (${strongestPillar.score}/100)`"></h3>
                  </div>
                  <div class="rounded-xl border border-border bg-white p-4 sm:p-5">
                    <p class="text-xs font-semibold uppercase tracking-widest text-ink-faint">Weakest Pillar</p>
                    <h3 class="mt-2 font-serif text-lg font-semibold text-ink" x-text="`${weakestPillar.name} (${weakestPillar.score}/100)`"></h3>
                  </div>
                </div>

                <div>
                  <h3 class="font-serif text-lg font-semibold text-ink">Pillar Score Breakdown</h3>
                  <div class="mt-4 space-y-4">
                    <template x-for="(pillar, index) in pillarBreakdown" :key="pillar.key">
                      <div class="rounded-xl border border-border bg-white p-4 sm:p-5 animate-fade-up" :class="`stagger-${Math.min(index + 1, 6)}`">
                        <div class="flex flex-col gap-2 sm:flex-row sm:items-start sm:justify-between">
                          <div>
                            <h4 class="font-semibold text-ink" x-text="pillar.name"></h4>
                            <p class="mt-1 text-sm text-ink-muted" x-text="interpretScore(pillar.score)"></p>
                          </div>
                          <div class="text-sm text-ink-muted sm:text-right">
                            <p><span class="font-semibold text-ink">Raw:</span> <span x-text="`${pillar.score}/100`"></span></p>
                            <p><span class="font-semibold text-ink">Weight:</span> <span x-text="`${Math.round(pillar.weight * 100)}%`"></span></p>
                            <p><span class="font-semibold text-ink">Contribution:</span> <span x-text="`${formatContribution(pillar.contribution)} points`"></span></p>
                          </div>
                        </div>
                        <div class="score-bar-track mt-3">
                          <div class="score-bar-fill" :style="`width: ${pillar.score}%`"></div>
                        </div>
                      </div>
                    </template>
                  </div>
                </div>

                <div class="rounded-xl border border-amber-200 bg-amber-50 p-5 sm:p-6">
                  <p class="text-xs font-semibold uppercase tracking-widest text-amber-800">Recommended 30-day action plan</p>
                  <p class="mt-3 text-sm leading-relaxed text-amber-950" x-text="recommendation"></p>
                </div>
              </div>
            </div>
          </template>
      </div>
    </main>

    <footer class="sticky bottom-0 z-20 border-t border-border bg-cream/90 backdrop-blur-md">
      <div class="mx-auto flex max-w-[var(--container-narrow)] items-center justify-between gap-4 px-4 py-4 sm:px-6">
        <button type="button" @click="previousStep()" :disabled="currentStep === 1" class="btn-secondary">Back</button>
        <button type="button" x-show="currentStep < steps.length" @click="nextStep()" class="btn-primary">Continue</button>
        <div x-show="currentStep === steps.length" class="flex gap-3">
          <button type="button" @click="currentStep = 1; saveSession()" class="btn-secondary">Review Answers</button>
          <button type="button" @click="clearSession()" class="btn-ghost">Start over</button>
        </div>
      </div>
    </footer>
  </div>

  <script>
    const STORAGE_KEY = 'engineer-scorecard-session';

    function candidateScorecard() {
      return {
        currentStep: 1,
        identityError: '',
        sessionRestored: false,
        exporting: false,

        steps: [
          { title: 'Candidate Identity', description: 'Personalize the final report with your target role, level, market, and positioning.' },
          { title: 'Technical Value Score', description: 'Measures actual ability and proof of engineering competence.', section: 'technical', scoreLabel: 'Technical Value:' },
          { title: 'Interview Readiness Score', description: 'Measures your ability to pass actual hiring processes.', section: 'interview', scoreLabel: 'Interview Readiness:' },
          { title: 'Branding Score', description: 'Measures how clearly and professionally you are packaged.', section: 'branding', scoreLabel: 'Branding:' },
          { title: 'Referral / Recommendation Score', description: 'Measures access to people who can help you reach opportunities.', section: 'referral', scoreLabel: 'Referral / Recommendation:' },
          { title: 'PR / Visibility Score', description: 'Measures external exposure and third-party credibility.', section: 'pr', scoreLabel: 'PR / Visibility:' },
          { title: 'Professional Readiness Score', description: 'Measures practical readiness, professional presentation, and opportunity preparedness.', section: 'readiness', scoreLabel: 'Professional Readiness:' },
          { title: 'Results', description: 'Review your final weighted Candidate Value Score and 30-day recommendation.' }
        ],

        identity: {
          name: '',
          email: '',
          targetRole: '',
          targetLevel: '',
          targetMarket: [],
          positioning: ''
        },

        technical: {
          productionProjects: 0,
          realUsers: 0,
          measurableImpact: 0,
          openSourceGsoc: 0,
          technicalDepth: 0,
          certificationsAcademics: 0
        },

        interview: {
          dsaLeetcode: 0,
          systemDesign: 0,
          mockInterviews: 0,
          technicalCommunication: 0,
          problemCount: 0
        },

        branding: {
          linkedin: 0,
          resume: 0,
          portfolioWebsite: 0,
          githubPresentation: 0,
          positioningClarity: 0
        },

        referral: {
          targetCompanyConnections: 0,
          referralReadiness: 0,
          recommendations: 0,
          communityStrength: 0
        },

        pr: {
          technicalContent: 0,
          thirdPartyFeatures: 0,
          speakingInterviews: 0,
          communityRecognition: 0,
          searchVisibility: 0
        },

        readiness: {
          interviewSetup: false,
          selfIntroduction: false,
          headshot: false,
          salaryRange: false,
          mobilityAuthorization: false,
          recruiterContact: false,
          targetCompanyList: false
        },

        weights: {
          technicalValue: 0.25,
          interviewReadiness: 0.20,
          branding: 0.15,
          referralRecommendation: 0.15,
          prVisibility: 0.10,
          professionalReadiness: 0.15
        },

        targetRoles: [
          'Backend Engineer',
          'Frontend Engineer',
          'Full Stack Engineer',
          'DevOps / Cloud Engineer',
          'Data Engineer',
          'AI / ML Engineer',
          'Mobile Engineer',
          'Cybersecurity Engineer',
          'Product Engineer',
          'Software Engineering Intern',
          'Not Sure Yet'
        ],

        targetLevels: [
          'Internship',
          'Entry-Level',
          'Mid-Level',
          'Senior',
          'Staff / Principal',
          'Not Sure Yet'
        ],

        targetMarkets: [
          'FAANG',
          'Fortune 500',
          'AI Startups',
          'Fintech',
          'Healthtech',
          'Enterprise SaaS',
          'Government / Defense',
          'Remote Global Companies',
          'Not Sure Yet'
        ],

        questions: {
          technical: [
            {
              id: 'productionProjects',
              label: 'How many production-level projects have you built?',
              area: 'Production projects',
              maxPoints: 20,
              note: 'A production-level project is not just a tutorial or classroom exercise. It should be deployable, usable, documented, and close to a real-world product, tool, feature, or system.',
              options: [
                { label: '0 projects', value: 0 },
                { label: '1 project', value: 5 },
                { label: '2–3 projects', value: 10 },
                { label: '4–5 projects', value: 15 },
                { label: '6+ projects', value: 20 }
              ]
            },
            {
              id: 'realUsers',
              label: 'Have any of your projects been used by real users?',
              area: 'Real users / deployment',
              maxPoints: 20,
              note: 'Real users prove that the candidate has built something beyond private practice. This includes customers, internal teams, classmates, open-source users, startup users, client users, or public users.',
              options: [
                { label: 'No real users', value: 0 },
                { label: 'A few users', value: 5 },
                { label: '100+ users', value: 10 },
                { label: '1,000+ users', value: 15 },
                { label: '10,000+ users', value: 20 }
              ]
            },
            {
              id: 'measurableImpact',
              label: 'Do you have measurable impact from your work?',
              area: 'Measurable impact',
              maxPoints: 20,
              note: 'Measurable impact can include improved speed, reduced load time, increased revenue, user growth, reduced infrastructure cost, automation, improved uptime, fewer errors, or improved team workflow.',
              options: [
                { label: 'No measurable impact', value: 0 },
                { label: 'Some claims, but no numbers', value: 5 },
                { label: 'At least one measurable result', value: 10 },
                { label: 'Multiple measurable results', value: 15 },
                { label: 'Strong metrics tied to business or engineering outcomes', value: 20 }
              ]
            },
            {
              id: 'openSourceGsoc',
              label: 'Have you contributed to open source or participated in GSOC-style programs?',
              area: 'Open source / GSOC',
              maxPoints: 15,
              note: 'This includes open-source contributions, Google Summer of Code, hackathons, research labs, internships, engineering fellowships, or other structured engineering programs. These signals show collaboration, discipline, public proof, and external validation.',
              options: [
                { label: 'No', value: 0 },
                { label: 'Minor contribution or participation', value: 4 },
                { label: 'Several contributions or completed participation', value: 8 },
                { label: 'Regular contributor or strong program completion', value: 12 },
                { label: 'Maintainer, winner, recognized contributor, or published participant', value: 15 }
              ]
            },
            {
              id: 'technicalDepth',
              label: 'Can you clearly explain the technical architecture, tradeoffs, and complexity behind your strongest projects?',
              area: 'Technical depth',
              maxPoints: 15,
              note: 'Technical depth measures whether the candidate can explain architecture, tradeoffs, scalability, debugging, performance, security, data modeling, infrastructure, and why certain engineering decisions were made.',
              options: [
                { label: 'Weak technical depth', value: 0 },
                { label: 'Basic understanding', value: 4 },
                { label: 'Can explain common implementation decisions', value: 8 },
                { label: 'Can explain architecture and tradeoffs clearly', value: 12 },
                { label: 'Strong senior-level technical reasoning', value: 15 }
              ]
            },
            {
              id: 'certificationsAcademics',
              label: 'Do you have technical certifications, degrees, diplomas, or academic credentials?',
              area: 'Certifications / academics',
              maxPoints: 10,
              note: 'Certifications and academics do not replace real engineering ability, but they improve credibility and perceived value. This can include degrees, diplomas, bootcamps, technical certificates, cloud certifications, security certifications, AI/data certifications, or relevant coursework.',
              options: [
                { label: 'None', value: 0 },
                { label: 'Basic online certificates', value: 2 },
                { label: 'Degree, diploma, bootcamp, or one respected certification', value: 5 },
                { label: 'Multiple respected credentials', value: 8 },
                { label: 'Credentials strongly aligned with target role', value: 10 }
              ]
            }
          ],

          interview: [
            {
              id: 'dsaLeetcode',
              label: 'How consistent is your LeetCode / DSA practice?',
              area: 'DSA / LeetCode',
              maxPoints: 25,
              note: 'For FAANG-style and elite technology interviews, algorithmic problem solving is still a major filter. This question measures consistency, not just talent.',
              options: [
                { label: 'No practice', value: 0 },
                { label: 'Occasional practice', value: 6 },
                { label: 'Weekly practice', value: 12 },
                { label: 'Several times per week', value: 18 },
                { label: 'Structured, consistent practice with strong topic coverage', value: 25 }
              ]
            },
            {
              id: 'systemDesign',
              label: 'Have you practiced system design?',
              area: 'System design',
              maxPoints: 25,
              note: 'System design measures the ability to reason about scalable architecture, databases, APIs, caching, queues, reliability, performance, and tradeoffs. It is especially important for mid-level, senior, and backend/platform roles.',
              options: [
                { label: 'No system design practice', value: 0 },
                { label: 'Watched videos only', value: 6 },
                { label: 'Practiced basic designs', value: 12 },
                { label: 'Can design common systems', value: 18 },
                { label: 'Can explain senior-level tradeoffs clearly', value: 25 }
              ]
            },
            {
              id: 'mockInterviews',
              label: 'Have you done mock interviews or interview simulations?',
              area: 'Mock interviews',
              maxPoints: 20,
              note: 'Interview simulation helps candidates practice communication, timing, pressure, and structured thinking. Many candidates know the topic but fail under interview conditions.',
              options: [
                { label: 'None', value: 0 },
                { label: '1–2 mock interviews', value: 5 },
                { label: '3–5 mock interviews', value: 10 },
                { label: '6–10 mock interviews', value: 15 },
                { label: '10+ mock interviews with feedback and improvement', value: 20 }
              ]
            },
            {
              id: 'technicalCommunication',
              label: 'Can you explain your solutions clearly out loud?',
              area: 'Technical communication under pressure',
              maxPoints: 15,
              note: 'This measures whether the candidate can think out loud, explain tradeoffs, clarify assumptions, respond to feedback, and communicate while solving problems.',
              options: [
                { label: 'No', value: 0 },
                { label: 'Weak', value: 4 },
                { label: 'Average', value: 8 },
                { label: 'Good', value: 12 },
                { label: 'Excellent', value: 15 }
              ]
            },
            {
              id: 'problemCount',
              label: 'How many interview-style coding problems have you solved?',
              area: 'Number of interview-style problems solved',
              maxPoints: 15,
              note: 'This measures breadth of exposure to interview-style problems. It should not reward quantity alone, but quantity helps indicate preparation depth when paired with understanding.',
              options: [
                { label: '0–25 problems', value: 0 },
                { label: '26–75 problems', value: 4 },
                { label: '76–150 problems', value: 8 },
                { label: '151–300 problems', value: 12 },
                { label: '300+ problems', value: 15 }
              ]
            }
          ],

          branding: [
            {
              id: 'linkedin',
              label: 'Do you have an optimized LinkedIn profile?',
              area: 'LinkedIn',
              maxPoints: 20,
              note: 'An optimized LinkedIn profile should clearly communicate target role, technical identity, experience, projects, keywords, credibility, and availability.',
              options: [
                { label: 'No LinkedIn', value: 0 },
                { label: 'Basic LinkedIn', value: 5 },

        get currentStepData() {
          return this.steps[this.currentStep - 1];
        },

        get currentQuestions() {
          return this.questions[this.currentStepData.section] || [];
        },

        get currentSectionState() {
          return this[this.currentStepData.section] || {};
        },

        get currentSectionScore() {
          if (this.currentStepData.section === 'readiness') return this.yesNoScore(this.readiness);
          return this.sumScore(this.currentSectionState);
        },

        get targetMarketDisplay() {
          return this.identity.targetMarket.length ? this.identity.targetMarket.join(', ') : 'Not specified';
        },

        sumScore(sectionObject) {
          return Object.values(sectionObject)
            .map(Number)
            .reduce((sum, value) => sum + value, 0);
        },

        yesNoScore(sectionObject) {
          const values = Object.values(sectionObject);
          const yesCount = values.filter(Boolean).length;

          if (!values.length) return 0;

          return Math.round((yesCount / values.length) * 100);
        },

        get pillarScores() {
          return {
            technicalValue: this.sumScore(this.technical),
            interviewReadiness: this.sumScore(this.interview),
            branding: this.sumScore(this.branding),
            referralRecommendation: this.sumScore(this.referral),
            prVisibility: this.sumScore(this.pr),
            professionalReadiness: this.yesNoScore(this.readiness)
          };
        },

        get weightedContributions() {
          const scores = this.pillarScores;

          return {
            technicalValue: scores.technicalValue * this.weights.technicalValue,
            interviewReadiness: scores.interviewReadiness * this.weights.interviewReadiness,
            branding: scores.branding * this.weights.branding,
            referralRecommendation: scores.referralRecommendation * this.weights.referralRecommendation,
            prVisibility: scores.prVisibility * this.weights.prVisibility,
            professionalReadiness: scores.professionalReadiness * this.weights.professionalReadiness
          };
        },

        get finalScore() {
          const total = Object.values(this.weightedContributions)
            .reduce((sum, value) => sum + value, 0);

          return Math.round(total);
        },

        get tier() {
          const score = this.finalScore;

          if (score >= 90) return 'Elite Candidate';
          if (score >= 75) return 'Strong Candidate';
          if (score >= 60) return 'Competitive but Incomplete';
          if (score >= 40) return 'Underpositioned Candidate';
          return 'Foundation Stage';
        },

        get tierDescription() {
          return this.tierDescriptions[this.tier];
        },

        get pillarBreakdown() {
          const scores = this.pillarScores;
          const contributions = this.weightedContributions;

          return this.pillarMeta.map((pillar) => ({
            ...pillar,
            score: scores[pillar.key],
            contribution: contributions[pillar.key]
          }));
        },

        get strongestPillar() {
          return this.pillarBreakdown.reduce((strongest, pillar) => (
            pillar.score > strongest.score ? pillar : strongest
          ), this.pillarBreakdown[0]);
        },

        get weakestPillar() {
          return this.pillarBreakdown.reduce((weakest, pillar) => (
            pillar.score < weakest.score ? pillar : weakest
          ), this.pillarBreakdown[0]);
        },

        get recommendation() {
          return this.recommendations[this.weakestPillar.key];
        },

        validateIdentity() {
          if (!this.identity.name || !this.identity.targetRole || !this.identity.targetLevel) {
            this.identityError = 'Full Name, Target Role, and Target Level are required.';
            return false;
          }

          this.identityError = '';
          return true;
        },

        nextStep() {
          if (this.currentStep === 1 && !this.validateIdentity()) return;
          if (this.currentStep < this.steps.length) this.currentStep += 1;
          this.saveSession();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        },

        previousStep() {
          if (this.currentStep > 1) this.currentStep -= 1;
          this.saveSession();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        },

        interpretScore(score) {
          if (score >= 85) return 'Strong and competitive.';
          if (score >= 70) return 'Good foundation with room to improve.';
          if (score >= 50) return 'Developing, but incomplete.';
          return 'Needs focused improvement.';
        },

        formatContribution(value) {
          return Number.isInteger(value) ? value.toString() : value.toFixed(1);
        },

        init() {
          this.loadSession();
        },

        getSessionPayload() {
          return {
            currentStep: this.currentStep,
            identity: this.identity,
            technical: this.technical,
            interview: this.interview,
            branding: this.branding,
            referral: this.referral,
            pr: this.pr,
            readiness: this.readiness
          };
        },

        saveSession() {
          try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(this.getSessionPayload()));
          } catch (error) {
            console.warn('Could not save session:', error);
          }
        },

        loadSession() {
          try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return;

            const data = JSON.parse(raw);
            if (data.identity) Object.assign(this.identity, data.identity);
            if (data.technical) Object.assign(this.technical, data.technical);
            if (data.interview) Object.assign(this.interview, data.interview);
            if (data.branding) Object.assign(this.branding, data.branding);
            if (data.referral) Object.assign(this.referral, data.referral);
            if (data.pr) Object.assign(this.pr, data.pr);
            if (data.readiness) Object.assign(this.readiness, data.readiness);
            if (data.currentStep) this.currentStep = data.currentStep;

            this.sessionRestored = true;
          } catch (error) {
            console.warn('Could not restore session:', error);
          }
        },

        clearSession() {
          localStorage.removeItem(STORAGE_KEY);
          this.sessionRestored = false;
          this.currentStep = 1;
          this.identityError = '';
          this.identity = { name: '', email: '', targetRole: '', targetLevel: '', targetMarket: [], positioning: '' };
          this.technical = { productionProjects: 0, realUsers: 0, measurableImpact: 0, openSourceGsoc: 0, technicalDepth: 0, certificationsAcademics: 0 };
          this.interview = { dsaLeetcode: 0, systemDesign: 0, mockInterviews: 0, technicalCommunication: 0, problemCount: 0 };
          this.branding = { linkedin: 0, resume: 0, portfolioWebsite: 0, githubPresentation: 0, positioningClarity: 0 };
          this.referral = { targetCompanyConnections: 0, referralReadiness: 0, recommendations: 0, communityStrength: 0 };
          this.pr = { technicalContent: 0, thirdPartyFeatures: 0, speakingInterviews: 0, communityRecognition: 0, searchVisibility: 0 };
          this.readiness = { interviewSetup: false, selfIntroduction: false, headshot: false, salaryRange: false, mobilityAuthorization: false, recruiterContact: false, targetCompanyList: false };
          window.scrollTo({ top: 0, behavior: 'smooth' });
        },

        getExportFilename(extension) {
          const name = (this.identity.name || 'candidate').trim().replace(/\s+/g, '-').toLowerCase();
          return `${name}-scorecard.${extension}`;
        },

        async captureReportCanvas() {
          const element = document.getElementById('results-report');
          if (!element) throw new Error('Report not found');

          return html2canvas(element, {
            scale: 2,
            backgroundColor: '#fafaf8',
            useCORS: true,
            logging: false,
            onclone: (clonedDoc) => {
              const report = clonedDoc.getElementById('results-report');
              if (!report) return;

              report.querySelectorAll('.score-bar-fill').forEach((bar) => {
                bar.style.animation = 'none';
              });

              report.querySelectorAll('.results-hero').forEach((hero) => {
                hero.style.background = 'linear-gradient(135deg, #ecfdf5 0%, #ffffff 100%)';
                hero.style.borderColor = '#a7f3d0';
              });
            }
          });
        },

        async downloadAsImage() {
          if (this.exporting) return;
          this.exporting = true;

          try {
            const canvas = await this.captureReportCanvas();
            const link = document.createElement('a');
            link.download = this.getExportFilename('png');
            link.href = canvas.toDataURL('image/png');
            link.click();
          } catch (error) {
            console.error('Image export failed:', error);
            alert('Could not generate image. Please try again.');
          } finally {
            this.exporting = false;
          }
        },

        async downloadAsPDF() {
          if (this.exporting) return;
          this.exporting = true;

          try {
            const canvas = await this.captureReportCanvas();
            const imgData = canvas.toDataURL('image/png');
            const pdf = new jspdf.jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
            const pageWidth = pdf.internal.pageSize.getWidth();
            const pageHeight = pdf.internal.pageSize.getHeight();
            const margin = 10;
            const contentWidth = pageWidth - margin * 2;
            const imgHeight = (canvas.height * contentWidth) / canvas.width;
            let heightLeft = imgHeight;
            let position = margin;

            pdf.addImage(imgData, 'PNG', margin, position, contentWidth, imgHeight);
            heightLeft -= pageHeight - margin * 2;

            while (heightLeft > 0) {
              position = heightLeft - imgHeight + margin;
              pdf.addPage();
              pdf.addImage(imgData, 'PNG', margin, position, contentWidth, imgHeight);
              heightLeft -= pageHeight - margin * 2;
            }

            pdf.save(this.getExportFilename('pdf'));
          } catch (error) {
            console.error('PDF export failed:', error);
            alert('Could not generate PDF. Please try again.');
          } finally {
            this.exporting = false;
          }
        }
      };
    }
  </script>
